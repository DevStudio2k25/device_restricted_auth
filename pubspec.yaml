name: device_restricted_auth
description: Device-based login restriction for Flutter apps with Firebase (Android + Windows Desktop)
version: 0.1.0
homepage: https://github.com/DevStudio2k25/device_restricted_auth

environment:
  sdk: '>=3.0.6 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  device_info_plus: ^12.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.2
  mocktail: ^1.0.4
